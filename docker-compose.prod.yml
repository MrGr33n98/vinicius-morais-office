services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: backend
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: backend_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend -d backend_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      RACK_ENV: production
      PORT: 3001
      PIDFILE: /tmp/puma.pid
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: backend
      BACKEND_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      APP_HOST: ${APP_HOST}
      CORS_ORIGINS: ${CORS_ORIGINS}
      RAILS_ASSUME_SSL: ${RAILS_ASSUME_SSL:-false}
      RAILS_FORCE_SSL: ${RAILS_FORCE_SSL:-false}
      SOLID_QUEUE_IN_PUMA: "true"
    command: ["bash", "-lc", "bundle exec rails db:prepare && bundle exec puma -C config/puma.rb"]
    volumes:
      - rails_storage:/rails/storage

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
  rails_storage:
